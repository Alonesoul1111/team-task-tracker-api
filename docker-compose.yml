version: '3.8'

services:
  # ─────── PostgreSQL ───────
  postgres:
    image: postgres:16-alpine
    container_name: task-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - task-tracker-net

  # ─────── Redis ───────
  redis:
    image: redis:7-alpine
    container_name: task-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - task-tracker-net

  # ─────── Backend API ───────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-tracker-api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/task_tracker?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: super-secret-access-key-change-in-production-2024
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production-2024
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - task-tracker-net
    restart: unless-stopped

  # ─────── Frontend ───────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-tracker-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - task-tracker-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  task-tracker-net:
    driver: bridge
